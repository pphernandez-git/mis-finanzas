<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Mis Finanzas</title>
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Finanzas">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="topbar">
  <button id="prevMonth" class="month-btn" aria-label="Mes anterior">‹</button>
  <div class="month-label" id="monthLabel">Julio 2026</div>
  <button id="nextMonth" class="month-btn" aria-label="Mes siguiente">›</button>
</header>

<main id="app">

  <!-- RESUMEN -->
  <section class="view" id="view-resumen">
    <div class="accounts-col" id="accountsRow"></div>

    <div class="card highlight" id="totalPagadoCard">
      <div class="card-label">Pagado este mes</div>
      <div class="card-value" id="totalPagadoMes">$0</div>
    </div>

    <div class="card">
      <div class="card-label">Ahorro total</div>
      <div class="card-value" id="ahorroTotal">$0</div>
    </div>

    <div class="card">
      <div class="card-title">Gasto por categoría</div>
      <div id="categoryBreakdown" class="category-list"></div>
    </div>
  </section>

  <!-- MOVIMIENTOS -->
  <section class="view hidden" id="view-movimientos">
    <button class="add-btn" id="addMovBtn">+ Nuevo movimiento</button>
    <div id="movList" class="mov-list"></div>
  </section>

  <!-- SALDO INICIAL -->
  <section class="view hidden" id="view-saldoinicial">
    <div class="card">
      <div class="card-title">Saldo inicial de <span id="saldoMesLabel">este mes</span></div>
      <div class="card-hint">Actualiza esta base a principio de mes según tus cartolas. En tarjetas también puedes fijar la fecha límite de pago.</div>
    </div>
    <div id="saldoInicialList" class="account-list"></div>
  </section>

  <!-- CUENTAS -->
  <section class="view hidden" id="view-cuentas">
    <button class="add-btn" id="addAccountBtn">+ Nueva cuenta</button>
    <div id="accountsList" class="account-list"></div>
  </section>

  <!-- CATEGORIAS -->
  <section class="view hidden" id="view-categorias">
    <button class="add-btn" id="addCategoryBtn">+ Nueva categoría</button>
    <div id="categoriesList" class="category-manage-list"></div>
  </section>

</main>

<nav class="bottom-nav">
  <button class="nav-btn active" data-view="resumen">
    <span class="nav-icon">◆</span><span>Resumen</span>
  </button>
  <button class="nav-btn" data-view="movimientos">
    <span class="nav-icon">≡</span><span>Movs.</span>
  </button>
  <button class="nav-btn" data-view="saldoinicial">
    <span class="nav-icon">⟲</span><span>Saldo</span>
  </button>
  <button class="nav-btn" data-view="cuentas">
    <span class="nav-icon">▢</span><span>Cuentas</span>
  </button>
  <button class="nav-btn" data-view="categorias">
    <span class="nav-icon">●</span><span>Categ.</span>
  </button>
</nav>

<!-- MODAL: Nuevo/editar movimiento -->
<div class="modal-overlay hidden" id="movModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="movModalTitle">Nuevo movimiento</h3>
      <button class="close-btn" data-close="movModal">×</button>
    </div>
    <form id="movForm">
      <label>Tipo</label>
      <div class="segmented" id="movTypeSeg">
        <button type="button" class="seg-btn active" data-type="pago">Pago</button>
        <button type="button" class="seg-btn" data-type="ingreso">Ingreso</button>
      </div>

      <label for="movDate">Fecha</label>
      <input type="date" id="movDate" required>

      <label for="movAccount">Cuenta</label>
      <select id="movAccount" required></select>

      <label for="movCategory">Categoría</label>
      <select id="movCategory"></select>

      <label for="movAmount">Monto (CLP)</label>
      <input type="number" id="movAmount" inputmode="decimal" min="0" step="1" required placeholder="0">

      <label for="movNote">Nota (opcional)</label>
      <input type="text" id="movNote" placeholder="Ej: Transferencia supermercado">

      <input type="hidden" id="movId">
      <div class="modal-actions">
        <button type="button" class="danger-btn hidden" id="deleteMovBtn">Eliminar</button>
        <button type="submit" class="primary-btn">Guardar</button>
      </div>
    </form>
  </div>
</div>

<!-- MODAL: Nueva/editar cuenta -->
<div class="modal-overlay hidden" id="accountModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="accountModalTitle">Nueva cuenta</h3>
      <button class="close-btn" data-close="accountModal">×</button>
    </div>
    <form id="accountForm">
      <label for="accName">Nombre</label>
      <input type="text" id="accName" required placeholder="Ej: Cuenta Vista">

      <label for="accType">Tipo</label>
      <select id="accType">
        <option value="vista">Cuenta vista</option>
        <option value="corriente">Cuenta corriente</option>
        <option value="tarjeta">Tarjeta de crédito</option>
        <option value="ahorro">Ahorro</option>
        <option value="otro">Otro</option>
      </select>

      <input type="hidden" id="accId">
      <div class="modal-actions">
        <button type="button" class="danger-btn hidden" id="deleteAccountBtn">Eliminar</button>
        <button type="submit" class="primary-btn">Guardar</button>
      </div>
    </form>
  </div>
</div>

<!-- MODAL: Nueva/editar categoria -->
<div class="modal-overlay hidden" id="categoryModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="categoryModalTitle">Nueva categoría</h3>
      <button class="close-btn" data-close="categoryModal">×</button>
    </div>
    <form id="categoryForm">
      <label for="catName">Nombre</label>
      <input type="text" id="catName" required placeholder="Ej: Salud">

      <input type="hidden" id="catId">
      <div class="modal-actions">
        <button type="button" class="danger-btn hidden" id="deleteCategoryBtn">Eliminar</button>
        <button type="submit" class="primary-btn">Guardar</button>
      </div>
    </form>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
